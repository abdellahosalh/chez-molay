<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- =============================================
       BASIC SEO META TAGS — CHIZ MOLLAY
       Copy this <head> section into every page.
       Change the title & description per page.
  ================================================ -->

  <!-- Page Title (60-70 characters max) -->
  <title>Chiz Mollay | Authentic Morocco Travel & Tours</title>

  <!-- Meta Description (150-160 characters max) -->
  <meta name="description" content="Discover Morocco with Chiz Mollay. We offer authentic travel experiences, guided tours, desert trips, and cultural adventures across Morocco.">

  <!-- Keywords -->
  <meta name="keywords" content="Morocco travel, Morocco tours, visit Morocco, Chiz Mollay, Morocco tourism, desert tours Morocco, Marrakech tours, guided tours Morocco">

  <!-- Author -->
  <meta name="author" content="Chiz Mollay">

  <!-- Tell search engines to index this page -->
  <meta name="robots" content="index, follow">

  <!-- Language -->
  <meta http-equiv="content-language" content="en">

  <!-- Canonical URL (change per page) -->
  <link rel="canonical" href="https://www.chizmollay.com/">

  <!-- =============================================
       OPEN GRAPH — for Facebook, WhatsApp sharing
  ================================================ -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Chiz Mollay | Authentic Morocco Travel & Tours">
  <meta property="og:description" content="Discover Morocco with Chiz Mollay. Authentic guided tours, desert trips, and cultural experiences across Morocco.">
  <meta property="og:url" content="https://www.chizmollay.com/">
  <meta property="og:site_name" content="Chiz Mollay">
  <meta property="og:locale" content="en_US">
  <!-- Add your logo image path below -->
  <meta property="og:image" content="https://www.chizmollay.com/images/logo-og.jpg">

  <!-- =============================================
       TWITTER CARD — for Twitter/X sharing
  ================================================ -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Chiz Mollay | Authentic Morocco Travel & Tours">
  <meta name="twitter:description" content="Discover Morocco with Chiz Mollay. Authentic guided tours and cultural experiences.">
  <meta name="twitter:image" content="https://www.chizmollay.com/images/logo-og.jpg">

  <!-- =============================================
       STRUCTURED DATA (JSON-LD) — Helps Google
       understand your business
  ================================================ -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "TravelAgency",
    "name": "Chiz Mollay",
    "url": "https://www.chizmollay.com",
    "description": "Authentic Morocco travel experiences, guided tours, and desert adventures.",
    "address": {
      "@type": "PostalAddress",
      "addressCountry": "MA"
    },
    "sameAs": [
      "https://www.facebook.com/chizmollay",
      "https://www.instagram.com/chizmollay"
    ]
  }
  </script>

  <!-- =============================================
       FAVICON (your site icon in browser tab)
       Add your favicon.ico file to your root folder
  ================================================ -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">

</head>
<body>

  <!-- YOUR WEBSITE CONTENT GOES HERE -->
  <h1>Welcome to Chiz Mollay</h1>
  <p>Authentic Morocco Travel &amp; Tours</p>

</body>
</html>
